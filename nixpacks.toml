[variables]
PHP_VERSION = "8.4"

[phases.setup]
nixPackages = [
    "php84",
    "php84Packages.composer",
    "php84Extensions.pdo",
    "php84Extensions.pdo_mysql"
]

[phases.build]
cmds = [
    "composer install --no-dev --prefer-dist --optimize-autoloader",
    "npm install",
    "npm run build"
]